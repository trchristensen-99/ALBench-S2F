# Exp 0: AlphaGenome cached-head oracle-label scaling curve on K562 hashFrag.
# Trains head on oracle pseudolabels with RC augmentation.
# Evaluates on true test labels.
task_mode: human
head_arch: boda-flatten-512-512
head_name: alphagenome_k562_head_hashfrag_oracle_scaling
num_tracks: 1

k562_data_path: data/k562
cache_dir: outputs/ag_hashfrag/embedding_cache
pseudolabel_dir: outputs/oracle_pseudolabels_k562_ag
output_dir: outputs/exp0_k562_scaling_oracle_labels_ag
weights_path: /grid/wsbs/home_norepl/christen/alphagenome_weights/alphagenome-jax-all_folds-v1
gpu: 0

# Training
fraction: 1.0  # override via ++fraction=$FRACTION in SLURM array
epochs: 100
early_stop_patience: 5
wandb_mode: offline

# RC augmentation
rc_aug: true

# Optimizer
lr: 0.001
weight_decay: 0.000001

# Head
dropout_rate: 0.1

# Data loading
batch_size: 512
