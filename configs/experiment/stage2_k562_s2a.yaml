# Stage 2: encoder fine-tuning on K562 hashFrag — config s2a
# encoder_lr = 1e-5, head_lr = 1e-5  (reference: uniform low LR, matches FT_MPRA paper)
#
# Loads Stage 1 best-model checkpoint (oracle_0) and fine-tunes the
# sequence_encoder jointly with the head using per-group AdamW.
# transformer_tower and sequence_decoder remain frozen.
#
# Run via: sbatch scripts/slurm/train_stage2_k562_sweep.sh

variant: s2a
task_mode: human
head_arch: boda-flatten-512-512
head_name: alphagenome_k562_head_hashfrag  # same as Stage 1 → _merge loads trained head
num_tracks: 1

k562_data_path: data/k562
output_dir: outputs/stage2_k562_s2a
stage1_dir: outputs/ag_hashfrag_oracle_cached/oracle_0
weights_path: /grid/wsbs/home_norepl/christen/alphagenome_weights/alphagenome-jax-all_folds-v1
gpu: 0

# Training
epochs: 50
early_stop_patience: 10
seed: null
wandb_mode: offline

# Optimizer — per-group learning rates
encoder_lr: 0.00001   # 1e-5: conservative encoder fine-tuning
head_lr: 0.00001      # 1e-5: uniform with encoder (reference config)
weight_decay: 0.000001

# Head
dropout_rate: 0.1

# Augmentation
max_shift: 15  # RC + ±15 bp shift (50 % probability each)

# Selective encoder unfreezing — only top 2 downres blocks (~41.5M of 90M encoder params)
# Reduces backward pass compute by ~55 %, speeds up training ~2×
unfreeze_encoder_blocks: [4, 5]

# Data — batch_size=128 feasible with selective freezing (fewer gradient tensors)
batch_size: 128
num_workers: 8

# K-fold (fold_0 = same 90/10 split as oracle_0 for fair val comparison)
fold_id: 0
n_folds: 10
