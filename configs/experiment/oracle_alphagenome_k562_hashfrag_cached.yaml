# Cached head-only oracle training on hashFrag K562 train split.
# Uses precomputed encoder embeddings so no encoder forward pass occurs during training.
# RC augmentation is applied at batch level (canonical + RC pass each epoch).
# No shift augmentation.  ~20-50x faster per epoch than full-encoder training.
#
# Prereq: build cache first with scripts/slurm/build_hashfrag_embedding_cache.sh
task_mode: human
head_arch: boda-flatten-512-512
head_name: alphagenome_k562_head_hashfrag
num_tracks: 1

cell_line: k562
k562_data_path: data/k562
cache_dir: outputs/ag_hashfrag/embedding_cache
output_dir: outputs/ag_hashfrag_oracle_cached/oracle_0
weights_path: /grid/wsbs/home_norepl/christen/alphagenome_weights/alphagenome-jax-all_folds-v1
gpu: 0

# Training
epochs: 100
early_stop_patience: 5
seed: null  # null → random seed; each run gets a distinct initialization
wandb_mode: offline

# Optimizer (matched to best config: boda_flatten_full_aug_v2)
lr: 0.001
weight_decay: 0.000001

# Head
dropout_rate: 0.1

# Data loading
batch_size: 256  # larger batch is fine since there is no encoder overhead
